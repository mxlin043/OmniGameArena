# SharedFloor - Improvement Dynamics Curve (IDC) config.
#
# Coop self-cooperation in IDC:
#   - Both players use the SAME player model (set by --model or below).
#   - Both players use the SAME skill prompt each round (shared skill).
#   - Each episode produces TWO reflection_traces (player_1/ + player_2/).
#   - The reflector reads both per-player traces but writes ONE skill
#     that both players will use in the next round.
#
# conditions. PDQ source layout for round 0:
#   pdq/shared_floor/player1-<model>_vs_player2-<model>/<params>/<ts>/
#     player_1/reflection_trace/
#     player_2/reflection_trace/

game: shared_floor
model: claude-opus-4-6

agent:
  kind: vlm
  method: lumine
  extra: {}

env:
  host: 127.0.0.1
  port: 12345         # player_1 port. player_2 auto = port + 1 = 12346.
  task: ""
  max_steps: 120
  screenshot_quality: 85
  map: shared_floor
  obs_delay: 2.0     

params:
  history_len: 3
  history_reasoning_len: 0
  temperature: 0.0
  resize_size: 0      
  hold_duration: 0.12
  with_game_prompt: true
  with_reasoning: true
  obs_delay: 2.0
  chunk_steps: 6

idc:
  rounds: 10
  episodes_per_round: 5
  official_pdq_root: runs/pdq
  output_root: runs/idc
  reflector_model: ""              # empty = reuse player model
  reflector_temperature: 0.0
  reflector_resize_size: 512
  max_reflection_iterations: 100
  validator_model: ""              # empty = reuse reflector model
  validator_temperature: 0.0
  max_validate_skill_calls: 5
  success_threshold: 0.999
  copy_full_episode: false

output:
  run_dir: ""
  live: false
  log_vlm: false
  api_debug: false
